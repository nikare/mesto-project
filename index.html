<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Mesto</title>
  </head>
  <body>
    <div class="page">
      <header class="header container">
        <img class="logo" src="./images/logo-white.svg" alt="Логотип" />
      </header>

      <main class="content container">
        <section class="profile">
          <div class="profile__avatar">
            <img class="profile__image" src="./images/avatar.png" alt="Аватар" />
          </div>
          <div class="profile__info">
            <div class="profile__name">
              <h1 class="profile__name-text">Жак-Ив Кусто</h1>
              <button
                class="profile__edit button"
                type="button"
                onclick="document.querySelector('.modal').classList.add('modal_active');"
              ></button>
            </div>
            <p class="profile__text">Исследователь океана</p>
          </div>
          <button class="profile__add button" type="button"></button>
        </section>

        <section class="cards">
          <ul class="cards__list">
            <li class="card cards__item">
              <img class="card__image" src="./images/card-karachayevsk.jpg" alt="Карачаевск" />
              <div class="card__caption">
                <h2 class="card__title">Карачаевск</h2>
                <button
                  class="card__like button"
                  type="button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
            <li class="card cards__item">
              <img class="card__image" src="./images/card-elbrus.jpg" alt="Гора Эльбрус" />
              <div class="card__caption">
                <h2 class="card__title">Гора Эльбрус</h2>
                <button
                  class="card__like button"
                  type="button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
            <li class="card cards__item">
              <img class="card__image" src="./images/card-dombay.jpg" alt="Домбай" />
              <div class="card__caption">
                <h2 class="card__title">Домбай</h2>
                <button
                  class="card__like button"
                  type="button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
            <li class="card cards__item">
              <img class="card__image" src="./images/card-elbrus.jpg" alt="Гора Эльбрус" />
              <div class="card__caption">
                <h2 class="card__title">Гора Эльбрус</h2>
                <button
                  class="card__like button"
                  type="button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
            <li class="card cards__item">
              <img class="card__image" src="./images/card-dombay.jpg" alt="Домбай" />
              <div class="card__caption">
                <h2 class="card__title">Домбай</h2>
                <button
                  type="button"
                  class="card__like button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
            <li class="card cards__item">
              <img
                class="card__image"
                src="./images/card-karachayevsk.jpg"
                alt="Карачаево-Черкесия"
              />
              <div class="card__caption">
                <h2 class="card__title">Карачаево-Черкесия</h2>
                <button
                  class="card__like button"
                  type="button"
                  onclick="this.classList.toggle('card__like_active');"
                ></button>
              </div>
            </li>
          </ul>
        </section>
      </main>

      <footer class="footer container">
        <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
      </footer>

      <div class="modal">
        <div class="modal__content">
          <button
            class="modal__close button"
            type="button"
            onclick="this.closest('.modal').classList.remove('modal_active')"
          ></button>
          <form class="form">
            <h2 class="form__title">Редактировать профиль</h2>
            <fieldset class="form__group">
              <input class="form__field" type="text" name="name" placeholder="Жак-Ив Кусто" />
              <input
                class="form__field"
                type="text"
                name="text"
                placeholder="Исследователь океана"
              />
            </fieldset>
            <button class="form__button button" type="submit">Сохранить</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
