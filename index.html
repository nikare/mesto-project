<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Mesto</title>
  </head>
  <body>
    <div class="page">
      <header class="header container">
        <img class="logo" src="./images/logo-white.svg" alt="Логотип" />
      </header>

      <main class="content container">
        <section class="profile">
          <div class="profile__avatar">
            <img class="profile__image" src="./images/avatar.png" alt="Аватар" />
          </div>
          <div class="profile__info">
            <h1 class="profile__name">
              <span class="profile__name-text">Жак-Ив Кусто</span>
              <button class="profile__edit button"></button>
            </h1>
            <p class="profile__text">Исследователь океана</p>
          </div>
          <button class="profile__add button"></button>
        </section>
      </main>

      <footer class="footer container">
        <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
      </footer>
    </div>
  </body>
</html>
